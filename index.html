<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is This Normal? — Graduation Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: #E4E1D8;
    --border2: #D0CDBF;
    --text: #1A1916;
    --text2: #6B6860;
    --text3: #9B9890;
    --purple: #6655D4;
    --purple-bg: #EEEDFC;
    --purple-text: #3D2FA8;
    --teal: #0F9B72;
    --teal-bg: #E0F5EE;
    --teal-text: #085041;
    --amber: #C47A12;
    --amber-bg: #FDF0D5;
    --amber-text: #7A4A07;
    --pink: #C0416E;
    --pink-bg: #FAEAF1;
    --pink-text: #7A2244;
    --red: #D64040;
    --red-bg: #FDEAEA;
    --red-text: #8B2020;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 0;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: height 0.3s ease, box-shadow 0.3s ease;
  }
  nav.expanded {
    height: 80px;
    box-shadow: none;
    border-bottom-color: transparent;
  }
  nav.scrolled {
    height: 48px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.07);
  }
  .nav-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    margin-right: 24px;
    white-space: nowrap;
  }
  .nav-title span { color: var(--text); }
  .nav-tabs { display: flex; gap: 2px; }
  .nav-tab {
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 400;
    border: none;
    background: none;
    color: var(--text2);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
  }
  .nav-tab:hover { background: var(--surface2); color: var(--text); }
  .nav-tab.active { background: var(--purple-bg); color: var(--purple-text); font-weight: 500; }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .btn-add {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    background: var(--purple);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.1s;
  }
  .btn-add:hover { opacity: 0.88; }
  .btn-add svg { width: 14px; height: 14px; }

  /* PAGES */
  .page { display: none; padding: 24px; max-width: 960px; margin: 0 auto; }
  .page.active { display: block; }

  /* HOME PAGE */
  .home-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
  @media (max-width: 700px) { .home-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text3);
    margin-bottom: 16px;
  }

  /* PHASE BANNER */
  .phase-banner {
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 20px;
    background: var(--purple-bg);
    border: 1px solid #D4CEFB;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .phase-banner-left {}
  .phase-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--purple); margin-bottom: 4px; }
  .phase-name { font-size: 20px; font-weight: 500; color: var(--purple-text); }
  .phase-desc { font-size: 12px; color: var(--purple-text); opacity: 0.8; margin-top: 2px; }
  .phase-days { text-align: right; }
  .phase-days-num { font-size: 28px; font-weight: 300; color: var(--purple-text); font-family: 'DM Mono', monospace; }
  .phase-days-label { font-size: 11px; color: var(--purple-text); opacity: 0.7; }

  /* TIMELINE */
  .timeline { margin-bottom: 4px; }
  .timeline-track {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 10px;
    display: flex;
  }
  .timeline-seg { height: 100%; transition: width 0.3s; }
  .seg-done { background: var(--teal); }
  .seg-active { background: var(--purple); }
  .seg-future { background: var(--border); }
  .timeline-milestones { display: flex; justify-content: space-between; margin-bottom: 16px; }
  .tm-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .tm-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--border2); background: var(--surface); }
  .tm-dot.done { border-color: var(--teal); background: var(--teal); }
  .tm-dot.active { border-color: var(--purple); background: var(--purple); }
  .tm-label { font-size: 10px; color: var(--text3); }
  .tm-day { font-size: 10px; color: var(--text2); font-weight: 500; }

  /* PHASE BARS */
  .phase-rows { display: flex; flex-direction: column; gap: 6px; }
  .phase-row { display: flex; align-items: center; gap: 10px; }
  .phase-row-label { font-size: 11px; color: var(--text2); width: 80px; flex-shrink: 0; text-align: right; }
  .phase-row-bar { flex: 1; height: 22px; border-radius: 4px; display: flex; align-items: center; padding: 0 10px; font-size: 11px; font-weight: 500; }
  .phase-wk { font-size: 10px; font-weight: 400; opacity: 0.7; margin-left: auto; }

  /* PRIORITY TASKS */
  .priority-task {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .priority-task:last-child { border-bottom: none; padding-bottom: 0; }
  .priority-task:first-child { padding-top: 0; }
  .pt-cb {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border2);
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .priority-task.done .pt-cb { background: var(--teal); border-color: var(--teal); }
  .priority-task.done .pt-cb::after { content: ''; display: block; width: 9px; height: 5px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg) translate(1px, -1px); }
  .pt-body { flex: 1; min-width: 0; }
  .pt-title { font-size: 13px; line-height: 1.4; }
  .priority-task.done .pt-title { text-decoration: line-through; color: var(--text3); }
  .pt-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .pt-urgent { border-left: 3px solid var(--red); padding-left: 10px; border-radius: 0; }
  .pt-urgent .pt-meta { color: var(--red-text); }

  .tag {
    display: inline-flex; align-items: center;
    font-size: 10px; font-weight: 500;
    padding: 2px 7px;
    border-radius: 20px;
    margin-right: 4px;
  }
  .tag-red { background: var(--red-bg); color: var(--red-text); }
  .tag-purple { background: var(--purple-bg); color: var(--purple-text); }
  .tag-teal { background: var(--teal-bg); color: var(--teal-text); }
  .tag-amber { background: var(--amber-bg); color: var(--amber-text); }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-num { font-size: 24px; font-weight: 300; font-family: 'DM Mono', monospace; color: var(--text); }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* TASKS PAGE */
  .tasks-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .tasks-header h2 { font-size: 16px; font-weight: 500; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 5px 12px;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.1s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--purple-bg); border-color: #D4CEFB; color: var(--purple-text); font-weight: 500; }

  .task-group { margin-bottom: 24px; }
  .tg-title {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--text3); margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .tg-count { font-weight: 400; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: border-color 0.1s;
  }
  .task-card:hover { border-color: var(--border2); }

  .task-card.done { opacity: 0.55; }

  .task-main {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
  }
  .tc-cb {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border2);
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .task-card.done .tc-cb { background: var(--teal); border-color: var(--teal); }
  .task-card.done .tc-cb::after { content: ''; display: block; width: 9px; height: 5px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg) translate(1px, -1px); }
  .tc-body { flex: 1; min-width: 0; }
  .tc-title { font-size: 13px; font-weight: 500; line-height: 1.4; }
  .task-card.done .tc-title { text-decoration: line-through; color: var(--text3); }
  .tc-desc { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.4; }
  .tc-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .tc-expand {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text3); cursor: pointer; flex-shrink: 0;
    border-radius: 4px; transition: background 0.1s;
    font-size: 16px; margin-top: 0;
  }
  .tc-expand:hover { background: var(--surface2); color: var(--text); }
  .tc-expand.open { transform: rotate(90deg); }

  .subtasks {
    border-top: 1px solid var(--border);
    padding: 10px 14px 10px 44px;
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .subtasks.open { display: flex; }
  .subtask {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text2);
    cursor: pointer;
  }
  .st-cb {
    width: 14px; height: 14px;
    border: 1.5px solid var(--border2);
    border-radius: 3px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .subtask.done .st-cb { background: var(--teal); border-color: var(--teal); }
  .subtask.done .st-cb::after { content: ''; display: block; width: 7px; height: 3px; border-left: 1.5px solid white; border-bottom: 1.5px solid white; transform: rotate(-45deg) translate(0px, -1px); }
  .subtask.done span { text-decoration: line-through; color: var(--text3); }
  .add-subtask-btn {
    background: none; border: none;
    font-size: 11px; color: var(--text3);
    cursor: pointer; font-family: inherit;
    display: flex; align-items: center; gap: 4px;
    padding: 2px 0;
  }
  .add-subtask-btn:hover { color: var(--purple); }

  .task-actions {
    display: flex; gap: 6px;
    padding: 0 14px 10px 44px;
    border-top: 1px solid var(--border);
    padding-top: 8px;
    display: none;
  }
  .task-actions.open { display: flex; }
  .act-btn {
    font-size: 11px; color: var(--text3);
    background: none; border: none;
    cursor: pointer; font-family: inherit;
    padding: 3px 8px; border-radius: 4px;
    transition: background 0.1s, color 0.1s;
  }
  .act-btn:hover { background: var(--surface2); color: var(--text); }
  .act-btn.danger:hover { background: var(--red-bg); color: var(--red-text); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 24px;
    width: 100%; max-width: 520px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    padding: 9px 12px;
    font-size: 13px;
    font-family: inherit;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.1s;
  }
  .form-input:focus { border-color: var(--purple); }
  textarea.form-input { resize: vertical; min-height: 80px; }
  select.form-input { cursor: pointer; }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .btn-cancel {
    padding: 8px 16px; font-size: 13px;
    background: none; border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text2); cursor: pointer; font-family: inherit;
  }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save {
    padding: 8px 20px; font-size: 13px;
    background: var(--purple); border: none;
    border-radius: var(--radius-sm);
    color: white; cursor: pointer; font-family: inherit; font-weight: 500;
  }
  .btn-save:hover { opacity: 0.88; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; }



  .tc-right {
    display: flex;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .tc-priority-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-right: 4px;
  }
  .tc-icon-btn {
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: none;
    color: var(--text3);
    border-radius: 5px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.1s, background 0.1s, color 0.1s;
  }
  .task-card:hover .tc-icon-btn { opacity: 1; }
  .tc-icon-btn:hover { background: var(--surface2); color: var(--text); }
  .tc-icon-delete:hover { background: var(--red-bg); color: var(--red-text); }

  .date-item {
    display:flex;align-items:flex-start;gap:10px;
    padding:9px 0;border-bottom:1px solid var(--border);
  }
  .date-item:last-child{border-bottom:none;padding-bottom:0}
  .date-item:first-child{padding-top:0}
  .date-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
  .date-dot-milestone{background:var(--purple)}
  .date-dot-meeting{background:var(--teal)}
  .date-dot-deadline{background:var(--red)}
  .date-dot-vacation{background:var(--amber)}
  .date-dot-other{background:var(--border2)}
  .date-body{flex:1;min-width:0}
  .date-title{font-size:13px;font-weight:500;line-height:1.3}
  .date-meta{font-size:11px;color:var(--text3);margin-top:2px}
  .date-delete{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;font-family:inherit;opacity:0;transition:opacity 0.1s}
  .date-item:hover .date-delete{opacity:1}
  .date-delete:hover{color:var(--red)}

  .nextup-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:14px 16px;
    box-shadow:var(--shadow);
  }
  .nextup-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:6px}
  .nextup-title{font-size:13px;font-weight:500;line-height:1.4}
  .nextup-meta{font-size:11px;color:var(--text3);margin-top:3px}

  .tl-week{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .tl-week-label{font-size:11px;color:var(--text2);width:36px;flex-shrink:0;text-align:right}
  .tl-week-bar{flex:1;height:28px;border-radius:5px;display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:500;position:relative;overflow:visible}
  .tl-week-bar.current{outline:2px solid var(--purple);outline-offset:1px}
  .tl-badge{position:absolute;right:-4px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:600;background:var(--purple);color:white;padding:2px 6px;border-radius:10px;white-space:nowrap;z-index:1}
  .tl-badge.vac{background:var(--amber-bg);color:var(--amber-text)}
  .tl-date-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

  @media(max-width:700px){#planning-grid{grid-template-columns:1fr}}

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>

function load() {
  try {
    const s = localStorage.getItem('vera_gp_v2');
    if (s) {
      state = JSON.parse(s);
      if (!state.taskStates) state.taskStates = {};
    } else {

      save();
    }
  } catch(e) {
    state.tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
  }
}

function save() {
  localStorage.setItem('vera_gp_v2', JSON.stringify(state));
}

function getCurrentWorkday() {
  const now = new Date();
  now.setHours(0,0,0,0);
  const start = new Date(START_DATE);
  start.setHours(0,0,0,0);
  if (now < start) return 1;
  let days = 0;
  const cur = new Date(start);
  while (cur <= now) {
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) days++;
    cur.setDate(cur.getDate() + 1);
  }
  return Math.max(1, Math.min(100, days));
}

function getCurrentPhase(day) {
  if (day <= 30) return PHASES[0];
  if (day <= 50) return PHASES[1];
  if (day <= 70) return PHASES[2];
  return PHASES[3];
}

function renderHome() {
  const day = getCurrentWorkday();
  const phase = getCurrentPhase(day);
  const daysLeft = 100 - day;

  document.getElementById('stat-day').textContent = day;
  document.getElementById('stat-done').textContent = state.tasks.filter(t => t.done).length;

    document.getElementById('priority-list').innerHTML = urgent.map(t => `

function renderTasks() {
  const phases = ['urgent','discovery','framing','ideation','prototype','finalisation'];
  const phaseLabels = {urgent:'⚡ Urgent / admin', discovery:'Phase 1 — Discovery', framing:'Phase 2 — Framing', ideation:'Phase 3 — Ideation', prototype:'Phase 4 — Prototype + test', finalisation:'Finalisation'};

  const filters = ['all', ...phases];
  document.getElementById('filter-row').innerHTML = filters.map(f => `
    <button class="filter-btn ${currentFilter === f ? 'active' : ''}" onclick="setFilter('${f}')">${f === 'all' ? 'All' : phaseLabels[f] || f}</button>
  `).join('');

  let html = '';
  const groupedPhases = currentFilter === 'all' ? phases : [currentFilter];

  groupedPhases.forEach(ph => {
    const tasks = state.tasks.filter(t => t.phase === ph);
    if (tasks.length === 0) return;
    const doneCount = tasks.filter(t => t.done).length;
    html += `<div class="task-group">
      <div class="tg-title">${phaseLabels[ph] || ph} <span class="tg-count">${doneCount}/${tasks.length}</span></div>`;
    tasks.forEach(t => {
      const isOpen = state.taskStates[t.id + '_open'];
      const subtaskDone = t.subtasks ? t.subtasks.filter(s => s.done).length : 0;
      const subtaskTotal = t.subtasks ? t.subtasks.length : 0;
      html += `<div class="task-card ${t.done ? 'done' : ''} ${t.priority === 'urgent' ? 'urgent' : ''}">
        <div class="task-main">
          <div class="tc-cb" onclick="toggleTaskDone('${t.id}'); event.stopPropagation()"></div>
          <div class="tc-body" onclick="toggleOpen('${t.id}')">
            <div class="tc-title">${esc(t.title)}</div>
            ${t.desc ? `<div class="tc-desc">${esc(t.desc)}</div>` : ''}
            <div class="tc-meta">
              ${t.priority === 'urgent' ? '<span class="tag tag-red">urgent</span>' : t.priority === 'high' ? '<span class="tag tag-amber">high</span>' : ''}
              ${subtaskTotal > 0 ? `<span style="font-size:11px;color:var(--text3)">${subtaskDone}/${subtaskTotal} subtasks</span>` : ''}
              ${t.due ? `<span style="font-size:11px;color:var(--text3)">${esc(t.due)}</span>` : ''}
            </div>
          </div>
          ${subtaskTotal > 0 || true ? `<div class="tc-expand ${isOpen ? 'open' : ''}" onclick="toggleOpen('${t.id}')">›</div>` : ''}
        </div>
        <div class="subtasks ${isOpen ? 'open' : ''}" id="sub-${t.id}">
          ${(t.subtasks || []).map(s => `
            <div class="subtask ${s.done ? 'done' : ''}" onclick="toggleSubtask('${t.id}','${s.id}')">
              <div class="st-cb"></div>
              <span>${esc(s.title)}</span>
            </div>
          `).join('')}
          <button class="add-subtask-btn" onclick="addSubtask('${t.id}')">+ add subtask</button>
        </div>
      </div>\`;
    });
    html += '</div>';
  });

  if (!html) html = '<div class="empty">No tasks yet — add one above!</div>';
  document.getElementById('task-list').innerHTML = html;
}

function toggleOpen(id) {
  state.taskStates[id + '_open'] = !state.taskStates[id + '_open'];
  save();
  renderTasks();
}

function toggleTaskDone(id) {
  const t = state.tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); renderHome(); renderTasks(); }
}

function toggleSubtask(taskId, subId) {
  const t = state.tasks.find(t => t.id === taskId);
  if (t && t.subtasks) {
    const s = t.subtasks.find(s => s.id === subId);
    if (s) { s.done = !s.done; save(); renderTasks(); }
  }
}

function addSubtask(taskId) {
  const title = prompt('Subtask:');
  if (!title || !title.trim()) return;
  const t = state.tasks.find(t => t.id === taskId);
  if (t) {
    if (!t.subtasks) t.subtasks = [];
    t.subtasks.push({id: 'st_' + Date.now(), title: title.trim(), done: false});
    save(); renderTasks();
  }
}

function editTask(id) {
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit task';
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-desc').value = t.desc || '';
  document.getElementById('f-phase').value = t.phase;
  document.getElementById('f-priority').value = t.priority;
  document.getElementById('f-due').value = t.due || '';
  document.getElementById('modal-overlay').classList.add('open');
}

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  save(); renderHome(); renderTasks();
}

function setFilter(f) {
  currentFilter = f;
  renderTasks();
}

function openModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add task';
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-phase').value = 'discovery';
  document.getElementById('f-priority').value = 'normal';
  document.getElementById('f-due').value = '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const data = {
    title,
    desc: document.getElementById('f-desc').value.trim(),
    phase: document.getElementById('f-phase').value,
    priority: document.getElementById('f-priority').value,
    due: document.getElementById('f-due').value.trim(),
  };
  if (editingId) {
    const t = state.tasks.find(t => t.id === editingId);
    if (t) Object.assign(t, data);
  } else {
    state.tasks.push({...data, id: 'u_' + Date.now(), done: false, subtasks: []});
  }
  save(); closeModal(); renderHome(); renderTasks();
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const tabIdx = {home:0, tasks:1, planning:2};
  document.querySelectorAll('.nav-tab')[tabIdx[name] ?? 0].classList.add('active');
  if (name === 'tasks') renderTasks();
  if (name === 'home') { renderHome(); renderNextUp(); }
  if (name === 'planning') { renderFullTimeline(); renderDatesList(); }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-NL', {day:'numeric', month:'short', year:'numeric'});
}
function daysUntil(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

      </div>
      <button class="date-delete" onclick="deleteDate('${d.id}')">✕</button>
    </div>`;
  }).join('');
}

function renderFullTimeline() {
  const day = getCurrentWorkday();
  const currentWeek = Math.ceil(day / 5);
  const dates = getDates();

  function getWeekDates(weekNum) {
    const weekStart = new Date(START_DATE);
    weekStart.setDate(weekStart.getDate() + (weekNum - 1) * 7);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 6);
    return {start: weekStart, end: weekEnd};
  }

  function datesInWeek(weekNum) {
    const {start, end} = getWeekDates(weekNum);
    return dates.filter(d => {
      const dd = new Date(d.date + 'T12:00:00');
      return dd >= start && dd <= end;
    });
  }

  const phaseMap = {1:'discovery',2:'discovery',3:'discovery',4:'discovery',5:'discovery',6:'discovery',7:'framing',8:'framing',9:'framing',10:'framing',11:'ideation',12:'ideation',13:'ideation',14:'ideation',15:'prototype',16:'prototype',17:'prototype',18:'prototype',19:'prototype',20:'prototype'};
  const phaseColors = {discovery:['#EEEDFC','#26215C'],framing:['#E0F5EE','#04342C'],ideation:['#FDF0D5','#412402'],prototype:['#FAEAF1','#4B1528']};
  const vacWks = [8,9,15,16];
  const msWks = {1:'Kick-off',8:'Midterm',16:'Green light',20:'Graduation'};

  let html = '';
  for (let w = 1; w <= 20; w++) {
    const isVac = vacWks.includes(w);
    const ph = phaseMap[w];
    const [bg, text] = isVac ? ['var(--surface2)','var(--text3)'] : phaseColors[ph];
    const isCurrent = w === currentWeek;
    const ms = msWks[w];
    const wkDates = datesInWeek(w);
    const {start} = getWeekDates(w);
    const dateStr = start.toLocaleDateString('en-NL',{day:'numeric',month:'short'});

    html += `<div class="tl-week">
      <div class="tl-week-label">wk ${w}</div>
      <div class="tl-week-bar ${isCurrent ? 'current' : ''}" style="background:${bg};color:${text}">
        <span style="font-size:10px;opacity:0.6;margin-right:6px">${dateStr}</span>
        ${isVac ? '<span style="font-size:11px">— vacation</span>' : ''}
        ${isCurrent ? '<span style="font-size:11px;font-weight:600">← you are here</span>' : ''}
        ${wkDates.map(d => `<span class="tl-date-dot date-dot-${d.type}" style="margin-left:4px" title="${d.title}"></span>`).join('')}
        ${ms ? `<span class="tl-badge ${ms==='vacation'?'vac':''}">${ms}</span>` : ''}
      </div>
    </div>`;
  }
  document.getElementById('full-timeline').innerHTML = html;
}

}
function closeDateModal() {
  document.getElementById('date-modal-overlay').classList.remove('open');
}
function closeDateModalOutside(e) {
  if (e.target === document.getElementById('date-modal-overlay')) closeDateModal();
}
function saveDate() {
  const title = document.getElementById('fd-title').value.trim();
  const date = document.getElementById('fd-date').value;
  if (!title || !date) { document.getElementById('fd-title').focus(); return; }
  const dates = loadDates();
  if (editingDateId) {
    const d = dates.find(d => d.id === editingDateId);
    if (d) { d.title = title; d.date = date; d.type = document.getElementById('fd-type').value; d.notes = document.getElementById('fd-notes').value.trim(); }
  } else {
    dates.push({id:'d_'+Date.now(), title, date, type: document.getElementById('fd-type').value, notes: document.getElementById('fd-notes').value.trim()});
  }
  saveDates(dates);
  closeDateModal();
  renderDatesList();
  renderFullTimeline();
  renderNextUp();
}
function deleteDate(id) {
  if (!confirm('Remove this date?')) return;
  const dates = loadDates().filter(d => d.id !== id);
  saveDates(dates);
  renderDatesList();
  renderFullTimeline();
  renderNextUp();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeDateModal(); } });

// Dynamic nav on scroll
const nav = document.querySelector('nav');
const logo = document.getElementById('nav-logo');
let lastScroll = 0;

function updateNav() {
  const scroll = window.scrollY;
  if (scroll < 10) {
    nav.classList.add('expanded');
    nav.classList.remove('scrolled');
    if (logo) logo.style.height = '52px';
  } else {
    nav.classList.remove('expanded');
    nav.classList.add('scrolled');
    if (logo) logo.style.height = '28px';
  }
  lastScroll = scroll;
}

window.addEventListener('scroll', updateNav, { passive: true });
updateNav();

load();
renderHome();
renderNextUp();
</script>

<!-- PLANNING PAGE -->
<div class="page" id="page-planning">
  <div style="display:grid;grid-template-columns:1fr 340px;gap:20px" id="planning-grid">
    <div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">20-week project timeline</div>
        <div id="full-timeline"></div>
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div class="card-title" style="margin-bottom:0">Key dates</div>
          <button class="btn-add" onclick="openDateModal()" style="padding:4px 10px;font-size:12px">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
            Add
          </button>
        </div>
        <div id="dates-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- DATE MODAL -->
<div class="modal-overlay" id="date-modal-overlay" onclick="closeDateModalOutside(event)">
  <div class="modal">
    <h3 id="date-modal-title">Add key date</h3>
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input class="form-input" id="fd-title" placeholder="e.g. Kick-off meeting, Midterm, Interview with Isabella">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date *</label>
        <input class="form-input" id="fd-date" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-input" id="fd-type">
          <option value="milestone">Milestone</option>
          <option value="meeting">Meeting</option>
          <option value="deadline">Deadline</option>
          <option value="vacation">Vacation</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes (optional)</label>
      <input class="form-input" id="fd-notes" placeholder="Extra info, location, link...">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDateModal()">Cancel</button>
      <button class="btn-save" onclick="saveDate()">Save</button>
    </div>
  </div>
</div>

</body>
